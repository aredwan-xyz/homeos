name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Syntax check
        run: |
          node --check services/core/src/index.js
          node --check services/simulator/src/index.js
          node --check scripts/dev.mjs
      - name: Boot test — stack comes up and serves live twin
        run: |
          node scripts/dev.mjs &
          DEV_PID=$!
          for i in $(seq 1 20); do
            sleep 1
            if curl -sf localhost:4700/healthz > /dev/null; then break; fi
          done
          curl -sf localhost:4700/healthz
          sleep 4
          curl -sf localhost:4700/api/twin | grep -q '"living"'
          curl -sf -X POST localhost:4700/api/cmd \
            -H 'content-type: application/json' \
            -d '{"room":"living","device":"lights","action":{"type":"lights","on":false}}' | grep -q '"ok":true'
          kill $DEV_PID
