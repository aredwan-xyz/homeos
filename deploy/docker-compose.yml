services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data

  timescale:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: homeos
      POSTGRES_PASSWORD: homeos
      POSTGRES_DB: homeos
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - timescale-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homeos -d homeos"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine

  core:
    build: ./services/core
    ports:
      - "4700:4700"
    environment:
      MQTT_URL: mqtt://mosquitto:1883
      REDIS_URL: redis://redis:6379
      PG_URL: postgres://homeos:homeos@timescale:5432/homeos
      PORT: "4700"
      DASHBOARD_DIR: /app/dashboard
    volumes:
      - ./dashboard:/app/dashboard:ro
    depends_on:
      mosquitto:
        condition: service_started
      redis:
        condition: service_started
      timescale:
        condition: service_healthy

  simulator:
    build: ./services/simulator
    environment:
      MQTT_URL: mqtt://mosquitto:1883
    depends_on:
      mosquitto:
        condition: service_started

volumes:
  mosquitto-data:
  timescale-data:
